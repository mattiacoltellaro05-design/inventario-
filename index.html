<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍸 Mint Inventory</title>
    <style>
        :root {
            --mint-green: #00D4AA;
            --mint-green-dark: #00B894;
            --mint-blue: #74B9FF;
            --mint-purple: #A29BFE;
            --mint-bg: #F7F9FC;
            --mint-card: rgba(255,255,255,0.95);
            --mint-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            --mint-border: rgba(0,212,170,0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--mint-green) 0%, var(--mint-blue) 50%, var(--mint-purple) 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1a1a1a;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            background: var(--mint-card);
            border-radius: 32px;
            box-shadow: var(--mint-shadow);
            overflow: hidden;
            backdrop-filter: blur(20px);
            border: 1px solid var(--mint-border);
        }

        .header {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(20px);
            padding: 40px 32px;
            text-align: center;
            border-bottom: 1px solid var(--mint-border);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--mint-green), var(--mint-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 17px;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }

        .content {
            padding: 40px 32px 32px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .mint-btn {
            height: 72px;
            border: none;
            border-radius: 24px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .mint-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .mint-btn:hover::before {
            left: 100%;
        }

        .mint-btn-add {
            background: linear-gradient(135deg, var(--mint-green), var(--mint-green-dark));
            color: white;
            box-shadow: 0 12px 32px rgba(0,212,170,0.4);
        }

        .mint-btn-add:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,212,170,0.5);
        }

        .mint-btn-add.active {
            background: linear-gradient(135deg, #00C997, #00B58A);
            box-shadow: 0 0 0 0px var(--mint-green);
        }

        .mint-btn-remove {
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            color: white;
            box-shadow: 0 12px 32px rgba(255,107,107,0.4);
        }

        .mint-btn-remove:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(255,107,107,0.5);
        }

        .mint-btn-remove.active {
            background: linear-gradient(135deg, #FF5252, #FF7675);
        }

        .scanner-section {
            display: none;
            margin-bottom: 24px;
        }

        .scanner-section.active {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #scannerVideo {
            width: 100%;
            height: 280px;
            border-radius: 20px;
            background: #000;
            display: block;
        }

        .scanner-frame {
            position: relative;
            margin-bottom: 16px;
        }

        .scanner-frame::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 10%;
            right: 10%;
            height: 60%;
            border: 3px solid var(--mint-green);
            border-radius: 12px;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
            pointer-events: none;
        }

        .manual-input {
            display: none;
            margin-bottom: 24px;
        }

        .manual-input.active {
            display: block;
        }

        .mint-input {
            width: 100%;
            height: 64px;
            padding: 0 24px;
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: SF Mono, Monaco, monospace;
            letter-spacing: 0.5px;
        }

        .mint-input:focus {
            outline: none;
            border-color: var(--mint-green);
            box-shadow: 0 0 0 4px rgba(0,212,170,0.1);
            transform: scale(1.02);
        }

        .quantity-section {
            display: none;
            margin-bottom: 24px;
            padding: 28px;
            background: rgba(255,255,255,0.6);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--mint-border);
        }

        .quantity-section.active {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .item-preview {
            text-align: center;
            margin-bottom: 24px;
        }

        .preview-name {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--mint-green), var(--mint-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .preview-code {
            font-size: 14px;
            color: #666;
            font-family: SF Mono, Monaco, monospace;
            padding: 8px 16px;
            background: rgba(0,212,170,0.1);
            border-radius: 20px;
            display: inline-block;
        }

        .qty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .qty-btn {
            height: 56px;
            border: 2px solid var(--mint-border);
            border-radius: 16px;
            background: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .qty-btn:hover, .qty-btn.active {
            background: var(--mint-green);
            color: white;
            border-color: var(--mint-green);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,212,170,0.3);
        }

        .custom-qty {
            grid-column: 1 / -1;
            margin-top: 16px;
        }

        .inventory-list {
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 24px;
        }

        .inventory-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: white;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid var(--mint-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .inventory-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.1);
        }

        .item-info h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .item-info p {
            font-size: 14px;
            color: #666;
            font-family: SF Mono, Monaco, monospace;
        }

        .item-qty {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--mint-green), var(--mint-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            min-width: 60px;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 24px;
            background: rgba(255,255,255,0.4);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--mint-green), var(--mint-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: rgba(26,26,26,0.6);
        }

        .empty-icon {
            font-size: 72px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 480px) {
            .action-grid { grid-template-columns: 1fr; }
            .qty-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍸 Mint Inventory</h1>
            <p>Gestione magazzino bottiglie</p>
        </div>

        <div class="content">
            <div class="action-grid">
                <button class="mint-btn mint-btn-add" id="addBtn">
                    <span style="font-size: 24px;">➕</span>
                    Aggiungi
                </button>
                <button class="mint-btn mint-btn-remove" id="removeBtn">
                    <span style="font-size: 24px;">➖</span>
                    Finita
                </button>
            </div>

            <!-- Scanner (placeholder - usa input manuale per semplicità) -->
            <div id="scannerSection" class="scanner-section">
                <div class="scanner-frame">
                    <video id="scannerVideo" autoplay playsinline muted style="display: none;"></video>
                </div>
                <div style="text-align: center; color: #666; font-size: 15px; margin-bottom: 16px;">
                    Oppure usa scanner esterno e incolla qui:
                </div>
            </div>

            <!-- Input Manuale (principale) -->
            <div id="inputSection" class="manual-input active">
                <input type="text" class="mint-input" id="barcodeInput" 
                       placeholder="📥 Incolla codice a barre (Ctrl+V) o premi Invio" autofocus>
            </div>

            <!-- Quantity Selector -->
            <div id="quantitySection" class="quantity-section">
                <div class="item-preview">
                    <div class="preview-name" id="previewName">Nome bottiglia</div>
                    <div class="preview-code" id="previewCode">-</div>
                </div>
                <div class="qty-grid">
                    <button class="qty-btn" data-qty="1">1</button>
                    <button class="qty-btn" data-qty="6">6</button>
                    <button class="qty-btn" data-qty="12">12</button>
                    <button class="qty-btn" data-qty="24">24</button>
                    <button class="qty-btn" data-qty="altro">Altro</button>
                </div>
                <input type="number" id="customQtyInput" class="mint-input custom-qty" 
                       placeholder="Quantità personalizzata" style="display: none;">
            </div>

            <div id="inventoryList" class="inventory-list"></div>
            
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">🍾</div>
                <h3>Il caveau è vuoto</h3>
                <p>Incolla il primo codice a barre per iniziare</p>
            </div>

            <div class="stats-grid" id="statsGrid" style="display: none;">
                <div class="stat">
                    <div class="stat-number" id="totalBottles">0</div>
                    <div class="stat-label">Bottiglie totali</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="totalTypes">0</div>
                    <div class="stat-label">Tipi diversi</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dati app
        let inventory = JSON.parse(localStorage.getItem('mintInventory')) || {};
        let bottleNames = JSON.parse(localStorage.getItem('bottleNames')) || {};
        let currentMode = null;
        let currentBarcode = null;

        // Database bottiglie comuni
        const COMMON_BOTTLES = {
            '8001100001014': 'Campari',
            '8000620001019': 'Aperol',
            '8010319001013': 'Martini Rosso',
            '8005100001012': 'Select',
            '8003840001015': 'Amaretto Disaronno',
            '8018629001012': 'Fernet Branca'
        };

        function getBottleName(barcode) {
            return COMMON_BOTTLES[barcode] || 
                   bottleNames[barcode] || 
                   `Bottiglia ${barcode.slice(-8).replace(/[^a-z0-9]/gi, '').toUpperCase().slice(0,8)}`;
        }

        // Inizializza interfaccia
        document.addEventListener('DOMContentLoaded', () => {
            updateDisplay();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Pulsanti modalità
            document.getElementById('addBtn').onclick = () => setMode('add');
            document.getElementById('removeBtn').onclick = () => setMode('remove');

            // Input barcode
            const barcodeInput = document.getElementById('barcodeInput');
            barcodeInput.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    const code = barcodeInput.value.trim();
                    if (code) processBarcode(code);
                }
            };

            barcodeInput.onpaste = () => {
                setTimeout(() => {
                    const code = barcodeInput.value.trim();
                    if (code) processBarcode(code);
                }, 50);
            };
        }

        function setMode(mode) {
            currentMode = mode;
            
            // Aggiorna pulsanti attivi
            document.querySelectorAll('.mint-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(mode === 'add' ? 'addBtn' : 'removeBtn').classList.add('active');
            
            // Reset sezioni
            document.getElementById('quantitySection').style.display = 'none';
            document.getElementById('barcodeInput').focus();
            document.getElementById('barcodeInput').value = '';
        }

        function processBarcode(barcode) {
            currentBarcode = barcode;
            const name = getBottleName(barcode);
            
            // Mostra preview
            document.getElementById('previewName').textContent = name;
            document.getElementById('previewCode').textContent = barcode;
            document.getElementById('quantitySection').style.display = 'block';
            
            setupQuantityButtons();
            document.getElementById('barcodeInput').blur();
        }

        function setupQuantityButtons() {
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.onclick = () => {
                    let qty = parseInt(btn.dataset.qty);
                    if (btn.dataset.qty === 'altro') {
                        const custom = document.getElementById('customQtyInput');
                        qty = parseInt(custom.value) || 1;
                        custom.style.display = 'none';
                    }
                    processQuantity(qty);
                };
            });

            // Custom quantity
            const customBtn = document.querySelector('[data-qty="altro"]');
            customBtn.onclick = (e) => {
                e.stopPropagation();
                const custom = document.getElementById('customQtyInput');
                custom.style.display = 'block';
                custom.focus();
            };

            document.getElementById('customQtyInput').onkeypress = (e) => {
                if (e.key === 'Enter') {
                    const qty = parseInt(e.target.value) || 1;
                    processQuantity(qty);
                }
            };
        }

        function processQuantity(qty) {
            if (!currentBarcode) return;

            if (currentMode === 'add') {
                inventory[currentBarcode] = (inventory[currentBarcode] || 0) + qty;
                
                // Salva nome personalizzato
                if (!bottleNames[currentBarcode]) {
                    const proposed = getBottleName(currentBarcode);
                    const name = prompt('Nome bottiglia (opzionale):', proposed);
                    if (name && name.trim()) {
                        bottleNames[currentBarcode] = name.trim();
                    }
                }
            } else {
                if (inventory[currentBarcode]) {
                    inventory[currentBarcode] = Math.max(0, inventory[currentBarcode] - qty);
                    if (inventory[currentBarcode] === 0) {
                        delete inventory[currentBarcode];
                    }
                }
            }

            saveData();
            updateDisplay();
            resetUI();
        }

        function resetUI() {
            currentBarcode = null;
            document.querySelectorAll('.mint-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('quantitySection').style.display = 'none';
            document.getElementById('customQtyInput').style.display = 'none';
            document.getElementById('barcodeInput').focus();
        }

        function updateDisplay() {
            const list = document.getElementById('inventoryList');
            const empty = document.getElementById('emptyState');
            const stats = document.getElementById('statsGrid');
            
            list.innerHTML = '';
            let totalItems = 0;
            let totalTypes = 0;

            for (let code in inventory) {
                if (inventory[code] > 0) {
                    totalItems += inventory[code];
                    totalTypes++;
                    
                    const item = document.createElement('div');
                    item.className = 'inventory-item';
                    item.onclick = () => {
                        navigator.clipboard.writeText(code);
                        item.style.background = 'rgba(116,185,255,0.1)';
                        setTimeout(() => item.style.background = '', 1000);
                    };
                    
                    item.innerHTML = `
                        <div class="item-info">
                            <h3>${getBottleName(code)}</h3>
                            <p>${code}</p>
                        </div>
                        <div class="item-qty">${inventory[code]}</div>
                    `;
                    list.appendChild(item);
                }
            }

            document.getElementById('totalBottles').textContent = totalItems;
            document.getElementById('totalTypes').textContent = totalTypes;

            if (totalItems === 0) {
                empty.style.display = 'block';
                stats.style.display = 'none';
            } else {
                empty.style.display = 'none';
                stats.style.display = 'grid';
            }
        }

        function saveData() {
            localStorage.setItem('mintInventory', JSON.stringify(inventory));
            localStorage.setItem('bottleNames', JSON.stringify(bottleNames));
        }
    </script>
</body>
</html>
