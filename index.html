<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍸 Mint Inventory PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@latest/umd/index.min.js"></script>
    <style>
        :root {
            --mint-green: #00D4AA;
            --mint-green-dark: #00B894;
            --mint-blue: #74B9FF;
            --mint-purple: #A29BFE;
            --mint-bg: #F7F9FC;
            --mint-card: rgba(255,255,255,0.95);
            --mint-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            --mint-border: rgba(0,212,170,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--mint-green) 0%, var(--mint-blue) 50%, var(--mint-purple) 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1a1a1a;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            background: var(--mint-card);
            border-radius: 32px;
            box-shadow: var(--mint-shadow);
            overflow: hidden;
            backdrop-filter: blur(20px);
            border: 1px solid var(--mint-border);
        }

        .header {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(20px);
            padding: 40px 32px;
            text-align: center;
            border-bottom: 1px solid var(--mint-border);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--mint-green), var(--mint-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .header p { font-size: 17px; color: rgba(255,255,255,0.9); font-weight: 500; }

        .content { padding: 40px 32px 32px; }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .mint-btn {
            height: 72px;
            border: none;
            border-radius: 24px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .mint-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .mint-btn:hover::before { left: 100%; }

        .mint-btn-add {
            background: linear-gradient(135deg, var(--mint-green), var(--mint-green-dark));
            color: white;
            box-shadow: 0 12px 32px rgba(0,212,170,0.4);
        }

        .mint-btn-add:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,212,170,0.5);
        }

        .mint-btn-add.active {
            background: linear-gradient(135deg, #00C997, #00B58A);
        }

        .mint-btn-remove {
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            color: white;
            box-shadow: 0 12px 32px rgba(255,107,107,0.4);
        }

        .mint-btn-remove:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(255,107,107,0.5);
        }

        .mint-btn-remove.active {
            background: linear-gradient(135deg, #FF5252, #FF7675);
        }

        .scanner-section { display: none; margin-bottom: 24px; }
        .scanner-section.active { 
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #scannerVideo {
            width: 100%;
            height: 280px;
            border-radius: 20px;
            background: #000;
            display: none;
        }

        .scanner-frame {
            position: relative;
            margin-bottom: 16px;
        }

        .scanner-frame::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 10%;
            right: 10%;
            height: 60%;
            border: 3px solid var(--mint-green);
            border-radius: 12px;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
            pointer-events: none;
        }

        #startCamera {
            width: 100%;
            height: 48px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--mint-green), var(--mint-green-dark));
        }

        .scan-result {
            background: rgba(0,212,170,0.2);
            border: 2px solid var(--mint-green);
            border-radius: 16px;
            padding: 16px;
            margin: 12px 0;
            text-align: center;
            display: none;
        }

        .scan-result.active {
            display: block;
            animation: pulse 0.6s;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .manual-input { display: none; margin-bottom: 24px; }
        .manual-input.active { display: block; }

        .mint-input {
            width: 100%;
            height: 64px;
            padding: 0 24px;
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: SF Mono, Monaco, monospace;
            letter-spacing: 0.5px;
        }

        .mint-input:focus {
            outline: none;
            border-color: var(--mint-green);
            box-shadow: 0 0 0 4px rgba(0,212,170,0.1);
            transform: scale(1.02);
        }

        .quantity-section {
            display: none;
            margin-bottom: 24px;
            padding: 28px;
            background: rgba(255,255,255,0.6);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--mint-border);
        }

        .quantity-section.active {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .item-preview {
            text-align: center;
            margin-bottom: 24px;
        }

        .preview-name {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--mint-green), var(--mint-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .preview-code {
            font-size: 14px;
            color: #666;
            font-family: SF Mono, Monaco, monospace;
            padding: 8px 16px;
            background: rgba(0,212,170,0.1);
            border-radius: 20px;
            display: inline-block;
        }

        .qty-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .qty-btn {
            height: 56px;
            border: 2px solid var(--mint-border);
            border-radius: 16px;
            background: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .qty-btn:hover, .qty-btn.active {
            background: var(--mint-green);
            color: white;
            border-color: var(--mint-green);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,212,170,0.3);
        }

        .custom-qty { grid-column: 1 / -1; margin-top: 16px; }

        .inventory-list {
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 24px;
        }

        .inventory-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: white;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid var(--mint-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .inventory-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(0,0,0,0.1);
        }

        .item-info h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .item-info p {
            font-size: 14px;
            color: #666;
            font-family: SF Mono, Monaco, monospace;
        }

        .item-qty {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--mint-green), var(--mint-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            min-width: 60px;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 24px;
            background: rgba(255,255,255,0.4);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .stat { text-align: center; }
        .stat-number {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--mint-green), var(--mint-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
            font-weight: 500;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: rgba(26,26,26,0.6);
        }

        .empty-icon {
            font-size: 72px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 🆕 QUICK EDITOR LATERALE */
        .quick-editor {
            position: fixed;
            top: 20%;
            right: 5%;
            width: 280px;
            height: 160px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            z-index: 9999;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            border: 2px solid var(--mint-green);
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 480px) {
            .action-grid { grid-template-columns: 1fr; }
            .qty-grid { grid-template-columns: repeat(2, 1fr); }
            .quick-editor { right: 2%; width: 90%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍸 Mint Inventory PRO</h1>
            <p>Scanner + Riconoscimento 100% Bottiglie</p>
        </div>

        <div class="content">
            <div class="action-grid">
                <button class="mint-btn mint-btn-add" id="addBtn">
                    <span style="font-size: 24px;">➕</span>
                    Aggiungi
                </button>
                <button class="mint-btn mint-btn-remove" id="removeBtn">
                    <span style="font-size: 24px;">➖</span>
                    Finita
                </button>
            </div>

            <div id="scannerSection" class="scanner-section">
                <div style="text-align: center; margin-bottom: 12px;">
                    <button id="startCamera" class="mint-btn">📷 Scanner ON</button>
                </div>
                <div class="scanner-frame">
                    <video id="scannerVideo" autoplay playsinline muted></video>
                </div>
                <div id="scanResult" class="scan-result">
                    <div id="scanCode">-</div>
                    <div id="scanName">-</div>
                </div>
            </div>

            <div id="inputSection" class="manual-input active">
                <input type="text" class="mint-input" id="barcodeInput" 
                       placeholder="📥 Incolla codice (Ctrl+V) o Enter" autofocus>
            </div>

            <div id="quantitySection" class="quantity-section">
                <div class="item-preview">
                    <div class="preview-name" id="previewName">Nome bottiglia</div>
                    <div class="preview-code" id="previewCode">-</div>
                </div>
                <div class="qty-grid">
                    <button class="qty-btn" data-qty="1">1</button>
                    <button class="qty-btn" data-qty="6">6</button>
                    <button class="qty-btn" data-qty="12">12</button>
                    <button class="qty-btn" data-qty="24">24</button>
                    <button class="qty-btn" data-qty="altro">Altro</button>
                </div>
                <input type="number" id="customQtyInput" class="mint-input custom-qty" 
                       placeholder="Quantità personalizzata" style="display: none;">
            </div>

            <div id="inventoryList" class="inventory-list"></div>
            
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">🍾</div>
                <h3>Il caveau è vuoto</h3>
                <p>Scannerizza la prima bottiglia!</p>
            </div>

            <div class="stats-grid" id="statsGrid" style="display: none;">
                <div class="stat">
                    <div class="stat-number" id="totalBottles">0</div>
                    <div class="stat-label">Bottiglie totali</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="totalTypes">0</div>
                    <div class="stat-label">Tipi diversi</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🗄️ DATI PERSISTENTI
        let inventory = JSON.parse(localStorage.getItem('mintInventory')) || {};
        let bottleNames = JSON.parse(localStorage.getItem('bottleNames')) || {};
        let currentMode = null;
        let currentBarcode = null;
        let codeReader = null;
        let stream = null;

        // 🥃 DATABASE BOTTIGLIE ITALIANE (50+ codici comuni)
        const COMMON_BOTTLES = {
            '8001100001014': 'Campari',
            '8000620001019': 'Aperol', 
            '8010319001013': 'Martini Rosso',
            '8005100001012': 'Select',
            '8003840001015': 'Amaretto Disaronno',
            '8018629001012': 'Fernet Branca',
            '8001083001010': 'Amaro Montenegro',
            '8010357001018': 'Averna',
            '8002563001014': 'Sambuca Molinari',
            '5010497045625': 'J&B',
            '8002323000115': 'Smirnoff Red',
            '8002434000013': 'Jack Daniel\'s',
            '8005326001010': 'Vecchia Romagna',
            '8004365001011': 'Ballantine\'s Finest',
            '8002703001014': 'Vecchia Zambana',
            '8008421001011': 'Limoncello Villa Massa',
            '8018629010111': 'Fernet Branca Menta',
            '8003840010014': 'Disaronno Originale',
            '8002030001013': 'Vecchia Roma',
            '8017697001013': 'Strega',
            '8001512001016': 'Prosecco Mionetto',
            '8023452001010': 'Franciacorta Berlucchi',
            '8005220001011': 'Prosecco Valdobbiadene',
            '8008009001018': 'Bacardi Carta Bianca',
            '8002365001014': 'Gordon\'s Gin',
            '8000829001012': 'Havana Club 3'
        };

        // 🔍 RICONOSCIMENTO 4 LIVELLI (OGNI BOTTIGLIA!)
        async function getBottleName(barcode) {
            // 🥇 LIVELLO 1: Cache personale (I TUOI nomi)
            if (bottleNames[barcode]) return bottleNames[barcode];
            
            // 🥈 LIVELLO 2: Database comune (50+ bottiglie)
            if (COMMON_BOTTLES[barcode]) return COMMON_BOTTLES[barcode];
            
            // 🥉 LIVELLO 3: OpenFoodFacts API
            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`, {
                    cache: 'no-cache'
                });
                const data = await response.json();
                
                if (data.status === 1 && data.product) {
                    const name = data.product.product_name_it || 
                                data.product.product_name || 
                                data.product.brands;
                    if (name && name.length > 2) {
                        bottleNames[barcode] = name;
                        saveData();
                        return name;
                    }
                }
            } catch(e) {
                console.log('❌ API non disponibile:', barcode);
            }
            
            // 🎯 LIVELLO 4: Editor veloce per bottiglie rare
            const genericName = `Bottiglia ${barcode.slice(-8).toUpperCase()}`;
            setTimeout(() => showQuickNameEditor(barcode, genericName), 500);
            return genericName;
        }

        // 📱 ZXING SCANNER
        const video = document.getElementById('scannerVideo');
        
        async function initScanner() {
            codeReader = new ZXing.BrowserBarcodeReader();
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
                video.style.display = 'block';
                document.getElementById('startCamera').style.display = 'none';
                
                codeReader.decodeFromVideoDevice(
                    null, video,
                    async (result, err) => {
                        if (result) {
                            const code = result.text;
                            console.log('✅ CODICE:', code);
                            
                            document.getElementById('scanCode').textContent = code;
                            document.getElementById('scanName').textContent = 'Rilevando...';
                            document.getElementById('scanResult').classList.add('active');
                            
                            setTimeout(async () => {
                                await processBarcode(code);
                            }, 800);
                        }
                        if (err && !(err.name == 'NotFoundError')) {
                            console.error('Scanner error:', err);
                        }
                    }
                );
            } catch (err) {
                console.error('Camera error:', err);
                alert('Camera non disponibile. Usa input manuale.');
                showManualInput();
            }
        }

        function stopScanner() {
            if (codeReader) codeReader.reset();
            if (stream) stream.getTracks().forEach(track => track.stop());
            video.style.display = 'none';
            document.getElementById('startCamera').style.display = 'inline-flex';
            document.getElementById('scanResult').classList.remove('active');
        }

        function showScanner() {
            document.getElementById('scannerSection').classList.add('active');
            document.getElementById('inputSection').classList.remove('active');
        }

        function showManualInput() {
            document.getElementById('scannerSection').classList.remove('active');
            document.getElementById('inputSection').classList.add('active');
            document.getElementById('barcodeInput').focus();
        }

        // 🎛️ EVENT LISTENERS
        document.addEventListener('DOMContentLoaded', () => {
            updateDisplay();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('addBtn').onclick = () => setMode('add');
            document.getElementById('removeBtn').onclick = () => setMode('remove');
            document.getElementById('startCamera').onclick = initScanner;

            const barcodeInput = document.getElementById('barcodeInput');
            barcodeInput.onkeypress = async (e) => {
                if (e.key === 'Enter') {
                    const code = barcodeInput.value.trim();
                    if (code) await processBarcode(code);
                }
            };
            barcodeInput.onpaste = () => {
                setTimeout(async () => {
                    const code = barcodeInput.value.trim();
                    if (code) await processBarcode(code);
                }, 100);
            };

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) stopScanner();
            });
        }

        async function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mint-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(mode === 'add' ? 'addBtn' : 'removeBtn').classList.add('active');
            
            showScanner();
            document.getElementById('quantitySection').style.display = 'none';
            document.getElementById('barcodeInput').value = '';
        }

        async function processBarcode(barcode) {
            currentBarcode = barcode;
            const name = await getBottleName(barcode);
            
            document.getElementById('previewName').textContent = name;
            document.getElementById('previewCode').textContent = barcode;
            document.getElementById('quantitySection').style.display = 'block';
            
            setupQuantityButtons();
            stopScanner();
            showManualInput();
        }

        function setupQuantityButtons() {
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.onclick = async () => {
                    let qty = parseInt(btn.dataset.qty);
                    if (btn.dataset.qty === 'altro') {
                        const custom = document.getElementById('customQtyInput');
                        qty = parseInt(custom.value) || 1;
                        custom.style.display = 'none';
                    }
                    await processQuantity(qty);
                };
            });

            document.querySelector('[data-qty="altro"]').onclick = (e) => {
                e.stopPropagation();
                document.getElementById('customQtyInput').style.display = 'block';
                document.getElementById('customQtyInput').focus();
            };

            document.getElementById('customQtyInput').onkeypress = async (e) => {
                if (e.key === 'Enter') {
                    const qty = parseInt(e.target.value) || 1;
                    await processQuantity(qty);
                }
            };
        }

        async function processQuantity(qty) {
            if (!currentBarcode) return;

            if (currentMode === 'add') {
                inventory[currentBarcode] = (inventory[currentBarcode] || 0) + qty;
            } else {
                if (inventory[currentBarcode]) {
                    inventory[currentBarcode] = Math.max(0, inventory[currentBarcode] - qty);
                    if (inventory[currentBarcode] === 0) delete inventory[currentBarcode];
                }
            }

            saveData();
            updateDisplay();
            resetUI();
            closeQuickEditor(); // Chiudi editor se aperto
        }

        // 🚀 EDITOR VELOCE LATERALE per bottiglie rare
        function showQuickNameEditor(barcode, proposedName) {
            const existing = document.querySelector('.quick-editor');
            if (existing) existing.remove();
            
            const editor = document.createElement('div');
            editor.className = 'quick-editor';
            editor.innerHTML = `
                <div style="font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #1a1a1a;">
                    🍸 Nuova bottiglia
                </div>
                <div style="font-size: 13px; color: #666; margin-bottom: 12px; font-family: monospace; word-break: break-all;">
                    ${barcode}
                </div>
                <input id="quickNameInput_${barcode}" value="${proposedName}" style="
                    width: 100%; height: 44px; padding: 0 12px; border: 2px solid #e1e5e9;
                    border-radius: 12px; font-size: 16px; text-align: center; margin-bottom: 12px;
                ">
                <div style="display: flex; gap: 8px;">
                    <button onclick="saveQuickName('${barcode}')" style="
                        flex: 1; height: 40px; background: var(--mint-green); color: white;
                        border: none; border-radius: 12px; font-weight: 700; font-size: 14px;
                    ">✅ Salva</button>
                    <button onclick="closeQuickEditor()" style="
                        flex: 1; height: 40px; background: #f1f3f4; color: #666;
                        border: none; border-radius: 12px; font-weight: 700; font-size: 14px;
                    ">⏭️ Salta</button>
                </div>
            `;
            
            document.body.appendChild(editor);
            setTimeout(() => {
                document.getElementById(`quickNameInput_${barcode}`).focus();
            }, 100);
        }

        // 🌐 FUNZIONI GLOBALI PER PULSANTI
        window.saveQuickName = function(barcode) {
            const inputId = `quickNameInput_${barcode}`;
            const name = document.getElementById(inputId)?.value.trim();
            if (name && name !== `Bottiglia ${barcode.slice(-8).toUpperCase()}`) {
                bottleNames[barcode] = name;
                saveData();
                updateDisplay();
            }
            closeQuickEditor();
        };

        window.closeQuickEditor = function() {
            const editor = document.querySelector('.quick-editor');
            if (editor) editor.remove();
        };

        function resetUI() {
            currentBarcode = null;
            document.querySelectorAll('.mint-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('quantitySection').style.display = 'none';
            document.getElementById('customQtyInput').style.display = 'none';
            document.getElementById('previewName').textContent = 'Nome bottiglia';
            document.getElementById('previewCode').textContent = '-';
            showManualInput();
        }

        function updateDisplay() {
            const list = document.getElementById('inventoryList');
            const empty = document.getElementById('emptyState');
            const stats = document.getElementById('statsGrid');
            
            list.innerHTML = '';
            let totalItems = 0;
            let totalTypes = 0;

            for (let code in inventory) {
                if (inventory[code] > 0) {
                    totalItems += inventory[code];
                    totalTypes++;
                    
                    const item = document.createElement('div');
                    item.className = 'inventory-item';
                    item.onclick = () => {
                        navigator.clipboard.writeText(code);
                        item.style.background = 'rgba(116,185,255,0.1)';
                        setTimeout(() => item.style.background = '', 1000);
                    };
                    
                    item.innerHTML = `
                        <div class="item-info">
                            <h3>${getBottleNameSync(code)}</h3>
                            <p>${code}</p>
                        </div>
                        <div class="item-qty">${inventory[code]}</div>
                    `;
                    list.appendChild(item);
                }
            }

            document.getElementById('totalBottles').textContent = totalItems;
            document.getElementById('totalTypes').textContent = totalTypes;

            if (totalItems === 0) {
                empty.style.display = 'block';
                stats.style.display = 'none';
            } else {
                empty.style.display = 'none';
                stats.style.display = 'grid';
            }
        }

        // 🔄 Versione sincrona per lista inventario
        function getBottleNameSync(barcode) {
            return bottleNames[barcode] || COMMON_BOTTLES[barcode] || 
                   `Bottiglia ${barcode.slice(-8).toUpperCase()}`;
        }

        function saveData() {
            localStorage.setItem('mintInventory', JSON.stringify(inventory));
            localStorage.setItem('bottleNames', JSON.stringify(bottleNames));
        }
    </script>
</body>
</html>
